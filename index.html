<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/src/assests/Images/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/src/assests/Images/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/src/assests/Images/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/src/assests/Images/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f2a944" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('hotel-yuvaan-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var shouldUseDark = theme ? theme === 'dark' : prefersDark;
          document.documentElement.classList.toggle('dark', shouldUseDark);
        } catch (error) {}
      })();
    </script>
    <title>Hotel Yuvaan | Admin Backoffice</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
